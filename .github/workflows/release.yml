name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.create_version.outputs.version }}
    steps:
      - name: Create Version
        id: create_version
        run: |
          VERSION=$(TZ='Asia/Shanghai' date +'v%Y%m%d%H%M')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  sync-mihomo:
    runs-on: ubuntu-latest
    outputs:
      mihomo_version: ${{ steps.sync.outputs.version }}
      mihomo_release_url: ${{ steps.sync.outputs.release_url }}
    steps:
      - name: Sync mihomo release assets and source
        id: sync
        run: |
          set -eo pipefail
          mkdir mihomo-assets
          MIHOMO_RELEASE_INFO=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/MetaCubeX/mihomo/releases/latest)
          
          MIHOMO_VERSION=$(echo "$MIHOMO_RELEASE_INFO" | jq -r '.tag_name')
          MIHOMO_RELEASE_URL=$(echo "$MIHOMO_RELEASE_INFO" | jq -r '.html_url')

          echo "version=${MIHOMO_VERSION}" >> $GITHUB_OUTPUT
          echo "release_url=${MIHOMO_RELEASE_URL}" >> $GITHUB_OUTPUT

          echo "Syncing mihomo version: ${MIHOMO_VERSION}"
          # Download binary assets
          echo "$MIHOMO_RELEASE_INFO" | jq -r '.assets[] | select(.name | startswith("mihomo-")) | .browser_download_url' | xargs -n 1 wget -P mihomo-assets
          # Download source code with specific names
          wget -O "mihomo-assets/mihomo-source-${MIHOMO_VERSION}.tar.gz" "https://github.com/MetaCubeX/mihomo/archive/refs/tags/${MIHOMO_VERSION}.tar.gz"
          wget -O "mihomo-assets/mihomo-source-${MIHOMO_VERSION}.zip" "https://github.com/MetaCubeX/mihomo/archive/refs/tags/${MIHOMO_VERSION}.zip"
      - name: Upload mihomo assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-assets
          path: mihomo-assets/

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin, freebsd]
        goarch: [amd64, arm64, arm, "386", mips, mipsle, mips64, mips64le]
        include:
          - goos: linux
            goarch: arm
            goarm: 7
        exclude:
          - goos: darwin
            goarch: arm
          - goos: darwin
            goarch: "386"
          - goos: darwin
            goarch: mips
          - goos: darwin
            goarch: mipsle
          - goos: darwin
            goarch: mips64
          - goos: darwin
            goarch: mips64le
          - goos: windows
            goarch: mips
          - goos: windows
            goarch: mipsle
          - goos: windows
            goarch: mips64
          - goos: windows
            goarch: mips64le
          - goos: freebsd
            goarch: mips
          - goos: freebsd
            goarch: mipsle
          - goos: freebsd
            goarch: mips64
          - goos: freebsd
            goarch: mips64le

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          BINARY_NAME="mihomo-tool"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV
          
          # Handle MIPS softfloat/hardfloat if needed, but for now standard build
          go build -ldflags="-s -w" -o "$BINARY_NAME" main.go
          
          # Create a package with static assets
          PACKAGE_NAME="mihomo-tool-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir "$PACKAGE_NAME"
          cp "$BINARY_NAME" "$PACKAGE_NAME/"
          cp index.html LICENSE "$PACKAGE_NAME/"
          cp -r css js "$PACKAGE_NAME/"
          
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${PACKAGE_NAME}.zip" "$PACKAGE_NAME"
          else
            tar -czvf "${PACKAGE_NAME}.tar.gz" "$PACKAGE_NAME"
          fi

      - name: Upload Linux Binary Artifact
        if: matrix.goos == 'linux' && (matrix.goarch == 'amd64' || matrix.goarch == 'arm64' || matrix.goarch == 'arm')
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: ${{ env.BINARY_NAME }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mihomo-tool-*.*

  release:
    needs: [prepare, build, sync-mihomo]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: |
            ## Synced mihomo Assets
            - **Source:** [MetaCubeX/mihomo@${{ needs.sync-mihomo.outputs.mihomo_version }}](${{ needs.sync-mihomo.outputs.mihomo_release_url }})
            - This release includes pre-compiled binaries and source code archives from the corresponding mihomo release.

          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-docker:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download linux binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: binary-linux-*

      - name: Prepare Docker context
        run: |
          # 创建 Docker 构建上下文所需的目录结构
          mkdir -p docker_context/bin/linux/amd64
          mkdir -p docker_context/bin/linux/arm64
          mkdir -p docker_context/bin/linux/arm/v7
          
          # 移动预编译的二进制文件到指定位置
          # download-artifact 会将 artifact 内容放在以 artifact 名称命名的子目录中
          mv binaries/binary-linux-amd64/mihomo-tool docker_context/bin/linux/amd64/
          mv binaries/binary-linux-arm64/mihomo-tool docker_context/bin/linux/arm64/
          mv binaries/binary-linux-arm7/mihomo-tool docker_context/bin/linux/arm/v7/
          
          # 复制 Dockerfile、静态资源等其他文件到构建上下文
          cp Dockerfile index.html LICENSE docker_context/
          cp -r css js docker_context/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository name
        id: repo_name
        run: echo "repository=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker_context
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            TZ=Asia/Shanghai
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.repository }}:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ steps.repo_name.outputs.repository }}:latest
